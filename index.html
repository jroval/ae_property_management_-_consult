<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <meta
      name="description"
      content="Gestión privada y personalizada de propiedades en Mallorca."
    />

    <title>AE Property Management & Consult</title>

    <style>
      :root {
        --background: #f4f1eb;
        --text: #171714;
        --muted: #6f6c65;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        min-height: 100svh;
        overflow: hidden;
        background: var(--background);
        color: var(--text);
        font-family:
          Arial,
          Helvetica,
          sans-serif;
      }

      .intro {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        padding: 2rem;
        text-align: center;
        opacity: 0;
        transform: translateY(8px);
        animation: intro-in 0.7s ease forwards;
      }

      .intro__logo {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 96px;
        height: 96px;
        border: 1px solid rgba(23, 23, 20, 0.25);
        border-radius: 50%;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 2rem;
        font-weight: 400;
        letter-spacing: 0.12em;
      }

      .intro__brand {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }

      .intro__name {
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(1rem, 3vw, 1.25rem);
        font-weight: 400;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .intro__subtitle {
        color: var(--muted);
        font-size: 0.72rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .intro--leaving {
        animation: intro-out 0.35s ease forwards;
      }

      @keyframes intro-in {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes intro-out {
        to {
          opacity: 0;
          transform: translateY(-5px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .intro,
        .intro--leaving {
          animation: none;
          opacity: 1;
          transform: none;
        }
      }
    </style>
  </head>

  <body>
    <main class="intro" id="intro">
      <div
        class="intro__logo"
        aria-label="AE Property Management & Consult"
      >
        AE
      </div>

      <div class="intro__brand">
        <h1 class="intro__name">
          Property Management &amp; Consult
        </h1>

        <p class="intro__subtitle">
          Mallorca
        </p>
      </div>
    </main>

    <noscript>
      <p>
        <a href="es/index.html">
          Acceder a la página web
        </a>
      </p>
    </noscript>

    <script>
      const intro = document.getElementById("intro");

      window.setTimeout(() => {
        intro.classList.add("intro--leaving");

        window.setTimeout(() => {
          window.location.replace("es/index.html");
        }, 350);
      }, 1100);
    </script>
  </body>
</html>
